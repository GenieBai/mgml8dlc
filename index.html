<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏主页</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* 背景全黑 */
            color: #fff;
            font-family: 'SimHei', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        .title {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #ff4444; /* 红色标题，营造恐怖氛围 */
            text-shadow: 2px 2px 4px #000;
        }

        .notice {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #333;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .start-button {
            padding: 15px 50px;
            font-size: 1.5em;
            background-color: #8b0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.7);
        }

        .start-button:hover {
            background-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.9);
            transform: scale(1.05);
        }

        .start-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">欢迎进入游戏世界</h1>
        <div class="notice">
            <p><strong>声明</strong></p>
            <p>目前本网站依旧为半成品，使用美术素材大多为视频内截图或公开游戏内素材。</p>
            <p>游玩过程中存在部分恐怖音效，光效闪动等因素，请谨慎观看。</p>
        </div>
        <button class="start-button" onclick="location.href='https://geniebai.github.io/mgml8dlc/sleep'">开始游戏</button>
    </div>

    <script>
        function startGame() {
            // 这里跳转到序章页面，请根据实际文件名修改
            window.location.href = '序章.html'; 
            // 如果序章文件名不同，请替换成正确的路径，例如：
            // window.location.href = 'prologue.html';
        }
    </script>
</body>
</html>
