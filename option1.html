<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘之旅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #000;
            background-image: url('https://t1.chatglm.cn/file/69d5271f299619fb248c5057.png?expired_at=1776008864&sign=0d3629e20d87bd882274d4fc3fc67aa2&ext=png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            color: #fff;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }
        
        .typewriter-text {
            opacity: 0;
        }
        
        .choice-btn {
            transition: all 0.2s ease;
            border: 2px solid #fff;
        }
        
        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full text-center">
        <div class="space-y-6 mb-10">
            <p id="text1" class="typewriter-text text-2xl font-bold"></p>
            <p id="text2" class="typewriter-text text-xl"></p>
            <p id="text3" class="typewriter-text text-xl"></p>
        </div>
        
        <div id="choices" class="space-y-4 hidden">
            <a href="https://geniebai.github.io/mgml8dlc/touch_door.html" class="choice-btn block py-3 px-6 rounded-lg text-lg">
                触摸门
            </a>
            <a href="https://geniebai.github.io/mgml8dlc/walk_forward.html" class="choice-btn block py-3 px-6 rounded-lg text-lg">
                向前走
            </a>
        </div>
    </div>

    <script>
        // 打字机效果函数
        function typeWriter(element, text, speed, callback) {
            let i = 0;
            element.style.opacity = 1;
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    setTimeout(callback, 500); // 每段结束后等待0.5秒
                }
            }
            
            type();
        }
        
        // 页面加载后开始打字效果
        document.addEventListener('DOMContentLoaded', function() {
            const text1 = document.getElementById('text1');
            const text2 = document.getElementById('text2');
            const text3 = document.getElementById('text3');
            const choices = document.getElementById('choices');
            
            // 设置打字速度（毫秒）
            const typingSpeed = 100;
            
            // 开始第一段打字
            typeWriter(text1, '视野逐渐清晰，你终于看清楚你身处何地', typingSpeed, function() {
                // 第一段结束后开始第二段
                typeWriter(text2, '面前的建筑飘散在烟尘之中，看不真切', typingSpeed, function() {
                    // 第二段结束后开始第三段
                    typeWriter(text3, '脚下的门闪烁着奇异的光', typingSpeed, function() {
                        // 所有文本打完后显示选项
                        choices.classList.remove('hidden');
                    });
                });
            });
        });
    </script>
</body>
</html>
